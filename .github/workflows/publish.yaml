name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # for npm --provenance (requires a public repo + "repository" field)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Smoke test the built CLI
        run: node dist/index.js --help

      # No NPM_TOKEN: this relies on npm Trusted Publishing (OIDC). The
      # id-token: write permission above lets npm mint a short-lived credential
      # for this workflow, and provenance is generated automatically.
      # One-time setup on npmjs.com: package settings → Trusted Publisher →
      # GitHub Actions → repo rusty-grapplehook/grapplehook-cli, workflow
      # publish.yml.
      - name: Publish
        run: npm publish --access public
